<!DOCTYPE html>
<html lang="fil">
<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <meta
    name="description"
    content="Mga civic explainer, text slogan, at personal na pagninilay mula kay jhElmEr—isang simpleng tao."
  >

  <title>Article | jhElmEr</title>

  <style>
    /* =====================================================
       BASIC RESET
    ===================================================== */

    *,
    *::before,
    *::after {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      background: #0d0d0e;
      color: #ededed;
      font-family:
        Arial,
        Helvetica,
        sans-serif;
      line-height: 1.7;
    }

    img {
      display: block;
      max-width: 100%;
    }

    a {
      color: inherit;
    }


    /* =====================================================
       WEBSITE HEADER
    ===================================================== */

    .site-header {
      position: relative;
      z-index: 10;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      background: rgba(13, 13, 14, 0.96);
    }

    .header-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: min(1180px, calc(100% - 40px));
      min-height: 82px;
      margin: 0 auto;
      gap: 28px;
    }

    .site-logo-link {
      display: inline-flex;
      align-items: center;
      flex-shrink: 0;
      text-decoration: none;
    }

    .site-logo {
      width: auto;
      height: 52px;
      object-fit: contain;
    }

    .site-nav {
      display: flex;
      align-items: center;
      gap: 26px;
    }

    .site-nav a {
      color: #bdbdbf;
      font-size: 0.86rem;
      font-weight: 700;
      text-decoration: none;
      transition:
        color 0.2s ease;
    }

    .site-nav a:hover {
      color: #ffffff;
    }


    /* =====================================================
       ARTICLE PAGE
    ===================================================== */

    .article-page {
      padding: clamp(46px, 7vw, 90px) 20px 90px;
    }

    .article-container {
      width: min(760px, 100%);
      margin: 0 auto;
    }


    /* ARTICLE HEADER */

    .article-header {
      margin-bottom: 34px;
    }

    .article-category {
      display: inline-block;
      margin-bottom: 15px;
      color: #d8b45a;
      font-size: 0.75rem;
      font-weight: 800;
      letter-spacing: 0.17em;
      line-height: 1.4;
      text-transform: uppercase;
    }

    .article-title {
      margin: 0;
      color: #ffffff;
      font-size: clamp(2.15rem, 7vw, 4.35rem);
      font-weight: 850;
      letter-spacing: -0.045em;
      line-height: 1.04;
      text-wrap: balance;
    }

    .article-meta {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 9px;
      margin-top: 20px;
      color: #88888c;
      font-size: 0.79rem;
      font-weight: 600;
    }

    .meta-dot {
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: #69696d;
    }


    /* FEATURED IMAGE */

    .article-image-wrap {
      margin: 0 0 clamp(34px, 6vw, 54px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 22px;
      background: #171719;
      overflow: hidden;
      box-shadow: 0 22px 60px rgba(0, 0, 0, 0.3);
    }

    .article-image {
      width: 100%;
      height: auto;
      max-height: 920px;
      object-fit: contain;
      background: #141416;
    }


    /* ARTICLE CONTENT */

    .article-content {
      color: #dedee0;
      font-size: clamp(1rem, 2.1vw, 1.09rem);
      line-height: 1.84;
    }

    .article-content p {
      margin: 0 0 1.55em;
    }

    .article-content p:last-child {
      margin-bottom: 0;
    }

    .article-content .single-line-emphasis {
      margin-top: 2em;
      margin-bottom: 2em;
      color: #ffffff;
      font-weight: 750;
    }

    .article-content .quoted-line {
      margin: 0.35em 0;
      padding-left: 17px;
      border-left: 2px solid rgba(216, 180, 90, 0.75);
      color: #f1f1f2;
      font-weight: 650;
    }


    /* SOURCES */

    .article-sources {
      display: none;
      margin-top: clamp(50px, 8vw, 76px);
      padding-top: 30px;
      border-top: 1px solid rgba(255, 255, 255, 0.1);
    }

    .article-sources.is-visible {
      display: block;
    }

    .sources-title {
      margin: 0 0 18px;
      color: #d8b45a;
      font-size: 0.75rem;
      font-weight: 800;
      letter-spacing: 0.16em;
      text-transform: uppercase;
    }

    .sources-list {
      margin: 0;
      padding-left: 20px;
      color: #a7a7aa;
      font-size: 0.88rem;
      line-height: 1.7;
    }

    .sources-list li {
      margin-bottom: 12px;
      padding-left: 4px;
    }


    /* SIMPLE BRAND SIGNATURE */

    .article-signature {
      margin-top: clamp(54px, 8vw, 80px);
      padding: 26px 0 0;
      border-top: 1px solid rgba(255, 255, 255, 0.09);
    }

    .signature-name {
      margin: 0 0 5px;
      color: #ffffff;
      font-size: 1rem;
      font-weight: 800;
    }

    .signature-line {
      margin: 0;
      color: #858589;
      font-size: 0.87rem;
      line-height: 1.6;
    }


    /* =====================================================
       FOOTER
    ===================================================== */

    .site-footer {
      border-top: 1px solid rgba(255, 255, 255, 0.08);
      background: #09090a;
    }

    .footer-inner {
      width: min(1180px, calc(100% - 40px));
      margin: 0 auto;
      padding: 34px 0;
      color: #77777b;
      font-size: 0.8rem;
      text-align: center;
    }

    .footer-inner strong {
      color: #bdbdbf;
    }


    /* =====================================================
       TABLET
    ===================================================== */

    @media (max-width: 800px) {
      .header-inner {
        min-height: 74px;
      }

      .site-logo {
        height: 46px;
      }

      .site-nav {
        gap: 17px;
      }

      .site-nav a {
        font-size: 0.78rem;
      }
    }


    /* =====================================================
       MOBILE
    ===================================================== */

    @media (max-width: 620px) {
      .header-inner {
        width: min(100% - 28px, 1180px);
        min-height: 68px;
      }

      .site-logo {
        height: 42px;
      }

      .site-nav {
        gap: 12px;
      }

      .site-nav a:not(:first-child) {
        display: none;
      }

      .site-nav a {
        font-size: 0.76rem;
      }

      .article-page {
        padding:
          38px
          16px
          70px;
      }

      .article-title {
        font-size: clamp(2rem, 11vw, 3.1rem);
        line-height: 1.06;
      }

      .article-meta {
        margin-top: 16px;
      }

      .article-image-wrap {
        margin-top: 28px;
        border-radius: 16px;
      }

      .article-content {
        font-size: 1rem;
        line-height: 1.78;
      }

      .article-content p {
        margin-bottom: 1.45em;
      }
    }


    /* =====================================================
       REDUCED MOTION
    ===================================================== */

    @media (prefers-reduced-motion: reduce) {
      html {
        scroll-behavior: auto;
      }
    }
  </style>
</head>


<body>

  <!-- ===================================================
       HEADER
  ==================================================== -->

  <header class="site-header">
    <div class="header-inner">

      <a
        class="site-logo-link"
        id="home-logo-link"
        href="index.html"
        aria-label="Bumalik sa homepage ng jhElmEr"
      >
        <img
          class="site-logo"
          id="header-logo"
          src="images/header-logo.png"
          alt="jhElmEr"
        >
      </a>

      <nav class="site-nav" aria-label="Main navigation">
        <a id="home-nav-link" href="index.html">Home</a>
        <a id="about-nav-link" href="about.html">About</a>
      </nav>

    </div>
  </header>


  <!-- ===================================================
       ARTICLE
  ==================================================== -->

  <main class="article-page">
    <article class="article-container">

      <header class="article-header">

        <span
          class="article-category"
          id="article-category"
        >
          CIVIC EXPLAINER
        </span>

        <h1
          class="article-title"
          id="article-title"
        >
          Pamagat ng Article
        </h1>

        <div class="article-meta">

          <span id="article-date">
            Hulyo 15, 2026
          </span>

          <span
            class="meta-dot"
            aria-hidden="true"
          ></span>

          <span>jhElmEr</span>

        </div>

      </header>


      <figure class="article-image-wrap">

        <img
          class="article-image"
          id="article-image"
          src="images/articles/article-image.jpg"
          alt="Featured image ng article"
        >

      </figure>


      <!--
        HUWAG LAGYAN NG <p> TAGS.

        I-PASTE LANG ANG BUONG ARTICLE BILANG NORMAL NA TEXT.
        BLANK LINE LANG SA PAGITAN NG BAWAT PARAGRAPH.
      -->

      <script
        type="text/plain"
        id="article-raw-content"
      >
Ilagay dito ang unang paragraph ng article.

Ilagay dito ang ikalawang paragraph. Mag-iwan lamang ng isang blank line sa pagitan ng bawat paragraph, katulad ng normal na Facebook post.

Hindi mo kailangang lagyan ng HTML code ang bawat paragraph.

Ipe-paste mo lamang dito ang buong article.
      </script>


      <!--
        DITO AWTOMATIKONG LALABAS ANG ARTICLE.
        HUWAG GALAWIN ANG DIV NA ITO.
      -->

      <div
        class="article-content"
        id="article-content"
      ></div>


      <!--
        SOURCES:

        Para sa Civic Explainer:
        I-paste ang sources sa loob ng block sa ibaba.

        Para sa Text Slogan:
        Iwanang blanko ang block.
        Awtomatikong mawawala ang Sources section.
      -->

      <script
        type="text/plain"
        id="article-raw-sources"
      >
American Psychological Association (APA) – Resources on respectful communication, conflict resolution, at constructive dialogue.

UNESCO – Media and Information Literacy (MIL) – Critical thinking, evaluation of information, at responsableng online discourse.
      </script>


      <section
        class="article-sources"
        id="article-sources"
        aria-labelledby="sources-title"
      >

        <h2
          class="sources-title"
          id="sources-title"
        >
          Mga Sanggunian
        </h2>

        <ul
          class="sources-list"
          id="sources-list"
        ></ul>

      </section>


      <footer class="article-signature">

        <p class="signature-name">
          jhElmEr
        </p>

        <p class="signature-line">
          Isang simpleng tao na may malinaw na paninindigan.
        </p>

      </footer>

    </article>
  </main>


  <!-- ===================================================
       FOOTER
  ==================================================== -->

  <footer class="site-footer">
    <div class="footer-inner">
      <strong>jhElmEr</strong> — Civic at creative platform ng isang simpleng tao.
    </div>
  </footer>


  <!-- ===================================================
       ARTICLE SETTINGS
       
       ITO LANG ANG PALITAN SA BAWAT BAGONG ARTICLE:
       
       1. type
       2. title
       3. date
       4. image
       5. imageAlt
       6. article content sa taas
       7. sources kung mayroon
  ==================================================== -->

  <script>
    const ARTICLE = {
      type: "CIVIC EXPLAINER",

      title: "Pamagat ng Article",

      date: "Hulyo 15, 2026",

      image: "images/articles/article-image.jpg",

      imageAlt: "Featured image ng article"
    };


    /* ===================================================
       HUWAG NANG GALAWIN ANG CODE MULA RITO PABABA
    ==================================================== */

    const currentPath = window.location.pathname;

    const isInsideArticlesFolder =
      currentPath.includes("/articles/");


    function resolveSitePath(path) {
      return isInsideArticlesFolder
        ? "../" + path
        : path;
    }


    function cleanRawText(text) {
      return text
        .replace(/^\s+|\s+$/g, "")
        .replace(/\r\n/g, "\n");
    }


    function buildArticleContent() {
      const rawElement =
        document.getElementById("article-raw-content");

      const outputElement =
        document.getElementById("article-content");

      const rawText =
        cleanRawText(rawElement.textContent);

      if (!rawText) {
        return;
      }

      const paragraphs =
        rawText.split(/\n\s*\n/);

      paragraphs.forEach((paragraphText) => {
        const cleanParagraph =
          paragraphText.trim();

        if (!cleanParagraph) {
          return;
        }

        const paragraph =
          document.createElement("p");

        paragraph.textContent =
          cleanParagraph.replace(/\n+/g, " ");

        const isQuotedLine =
          /^["“].+["”]$/.test(cleanParagraph);

        const isShortStandaloneLine =
          cleanParagraph.length <= 90 &&
          !/[.!?]$/.test(cleanParagraph);

        if (isQuotedLine) {
          paragraph.classList.add("quoted-line");
        }

        if (isShortStandaloneLine) {
          paragraph.classList.add(
            "single-line-emphasis"
          );
        }

        outputElement.appendChild(paragraph);
      });
    }


    function buildSources() {
      const rawSourcesElement =
        document.getElementById("article-raw-sources");

      const sourcesSection =
        document.getElementById("article-sources");

      const sourcesList =
        document.getElementById("sources-list");

      const rawSources =
        cleanRawText(rawSourcesElement.textContent);

      if (!rawSources) {
        sourcesSection.classList.remove(
          "is-visible"
        );

        return;
      }

      const sources =
        rawSources.split(/\n\s*\n/);

      sources.forEach((sourceText) => {
        const cleanSource =
          sourceText
            .replace(/^[•\-]\s*/, "")
            .trim();

        if (!cleanSource) {
          return;
        }

        const listItem =
          document.createElement("li");

        listItem.textContent =
          cleanSource.replace(/\n+/g, " ");

        sourcesList.appendChild(listItem);
      });

      sourcesSection.classList.add(
        "is-visible"
      );
    }


    function applyArticleSettings() {
      document.title =
        ARTICLE.title + " | jhElmEr";

      document
        .getElementById("article-category")
        .textContent = ARTICLE.type;

      document
        .getElementById("article-title")
        .textContent = ARTICLE.title;

      document
        .getElementById("article-date")
        .textContent = ARTICLE.date;

      const articleImage =
        document.getElementById("article-image");

      articleImage.src =
        resolveSitePath(ARTICLE.image);

      articleImage.alt =
        ARTICLE.imageAlt;

      document
        .querySelector('meta[name="description"]')
        .setAttribute(
          "content",
          ARTICLE.title +
          " — civic at creative content mula kay jhElmEr."
        );
    }


    function applyWebsitePaths() {
      document
        .getElementById("header-logo")
        .src =
          resolveSitePath(
            "images/header-logo.png"
          );

      document
        .getElementById("home-logo-link")
        .href =
          resolveSitePath("index.html");

      document
        .getElementById("home-nav-link")
        .href =
          resolveSitePath("index.html");

      document
        .getElementById("about-nav-link")
        .href =
          resolveSitePath("about.html");
    }


    applyArticleSettings();
    applyWebsitePaths();
    buildArticleContent();
    buildSources();
  </script>

</body>
</html>
