<!DOCTYPE html>
<html lang="fil">

<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>All Civic Explainers | jhElmEr</title>

  <meta
    name="description"
    content="Permanenteng archive ng lahat ng Civic Explainers ni jhElmEr."
  >

  <style>
    :root {
      --background: #08090a;
      --surface: #0c0d0f;
      --text: #f1ede5;
      --muted: #989898;
      --gold: #d3ad55;
      --gold-soft: rgba(211, 173, 85, 0.22);
      --border: rgba(255, 255, 255, 0.12);
      --header-height: 180px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      min-height: 100vh;

      background:
        radial-gradient(
          circle at 82% 42%,
          rgba(88, 47, 26, 0.08),
          transparent 34%
        ),
        var(--background);

      color: var(--text);

      font-family:
        Arial,
        Helvetica,
        sans-serif;

      line-height: 1.6;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    /* ===================================
       HEADER
       =================================== */

    .site-header {
      position: relative;
      z-index: 1000;

      min-height: var(--header-height);

      display: flex;
      align-items: center;

      border-bottom:
        1px solid var(--gold-soft);

      background:
        rgba(7, 8, 9, 0.98);
    }

    .header-inner {
      width:
        min(
          1180px,
          calc(100% - 48px)
        );

      margin: 0 auto;

      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 32px;
    }

    .brand {
      display: inline-flex;
      align-items: center;

      min-width: 0;
    }

    .brand img {
      display: block;

      width: min(470px, 58vw);
      height: auto;

      object-fit: contain;
    }

    .desktop-nav {
      display: flex;
      align-items: center;
      gap: 28px;
    }

    .desktop-nav a {
      color: #b5b5b5;

      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;

      transition:
        color 0.22s ease,
        opacity 0.22s ease;
    }

    .desktop-nav a:hover,
    .desktop-nav a:focus-visible,
    .desktop-nav a[aria-current="page"] {
      color: var(--gold);
      outline: none;
    }

    .menu-button {
      display: none;

      width: 54px;
      height: 54px;

      border:
        1px solid rgba(255, 255, 255, 0.18);

      background: transparent;
      color: var(--text);

      cursor: pointer;
    }

    .menu-button span {
      display: block;

      width: 25px;
      height: 3px;

      margin: 5px auto;

      background: currentColor;

      transition:
        transform 0.22s ease,
        opacity 0.22s ease;
    }

    .menu-button.is-open span:nth-child(1) {
      transform:
        translateY(8px)
        rotate(45deg);
    }

    .menu-button.is-open span:nth-child(2) {
      opacity: 0;
    }

    .menu-button.is-open span:nth-child(3) {
      transform:
        translateY(-8px)
        rotate(-45deg);
    }

    .mobile-nav {
      display: none;
    }

    /* ===================================
       RETURN NAVIGATION
       =================================== */

    .back-navigation {
      position: relative;
      z-index: 50;

      width: 100%;

      border-bottom:
        1px solid rgba(255, 255, 255, 0.08);

      background: #08090a;
    }

    .back-navigation-inner {
      width:
        min(
          1180px,
          calc(100% - 48px)
        );

      min-height: 54px;
      margin: 0 auto;

      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 10px 16px;
    }

    .back-navigation-link {
      display: inline-flex;
      align-items: center;
      gap: 9px;

      color: rgba(241, 237, 229, 0.55);

      font-size: 0.7rem;
      font-weight: 800;
      line-height: 1;
      letter-spacing: 0.14em;
      text-transform: uppercase;

      transition:
        color 0.22s ease,
        transform 0.22s ease;
    }

    .back-navigation-arrow {
      color: var(--gold);

      font-size: 1rem;
      line-height: 1;
    }

    .back-navigation-divider {
      color: rgba(241, 237, 229, 0.18);

      font-size: 0.72rem;
      line-height: 1;
    }

    .back-navigation-link:hover,
    .back-navigation-link:focus-visible {
      color: var(--gold);

      transform:
        translateX(-3px);

      outline: none;
    }

    /* ===================================
       ARCHIVE
       =================================== */

    .archive-main {
      position: relative;

      min-height: 62vh;

      overflow: hidden;
    }

    .archive-main::after {
      content: "";

      position: absolute;
      right: -300px;
      bottom: -330px;

      width: 620px;
      height: 620px;

      border:
        1px solid rgba(211, 173, 85, 0.11);

      border-radius: 50%;

      pointer-events: none;
    }

    .archive-section {
      position: relative;
      z-index: 2;

      padding: 82px 0 110px;
    }

    .archive-container {
      width:
        min(
          900px,
          calc(100% - 48px)
        );

      margin: 0 auto;
    }

    .archive-heading {
      margin-bottom: 34px;

      color: var(--text);

      font-size:
        clamp(
          1.45rem,
          3vw,
          2rem
        );

      font-weight: 900;
      line-height: 1.15;
      letter-spacing: -0.025em;
      text-transform: uppercase;
    }

    .archive-list {
      list-style: none;

      border-top:
        1px solid var(--border);
    }

    .archive-item {
      border-bottom:
        1px solid var(--border);
    }

    .archive-link {
      position: relative;

      width: 100%;
      min-height: 62px;
      padding: 18px 48px 18px 0;

      display: flex;
      align-items: center;

      color: #d6d2cb;

      font-size:
        clamp(
          1rem,
          2vw,
          1.16rem
        );

      font-weight: 700;
      line-height: 1.4;
      letter-spacing: 0.005em;

      transition:
        color 0.22s ease;
    }

    .archive-link::after {
      content: "→";

      position: absolute;
      right: 6px;

      color: var(--gold);

      font-size: 1.15rem;
      line-height: 1;

      opacity: 0.62;

      transform:
        translateX(0);

      transition:
        opacity 0.22s ease,
        transform 0.22s ease;
    }

    .archive-link:hover,
    .archive-link:focus-visible {
      color: var(--gold);
      outline: none;
    }

    .archive-link:hover::after,
    .archive-link:focus-visible::after {
      opacity: 1;

      transform:
        translateX(4px);
    }

    /* ===================================
       FOOTER
       =================================== */

    .site-footer {
      padding: 38px 24px;

      border-top:
        1px solid var(--border);

      background: #070809;

      text-align: center;
    }

    .site-footer p {
      color: #777;

      font-size: 0.78rem;
      letter-spacing: 0.08em;
    }

    /* ===================================
       MOBILE
       =================================== */

    @media (max-width: 850px) {
      :root {
        --header-height: 180px;
      }

      .header-inner {
        width:
          calc(100% - 58px);
      }

      .brand img {
        width:
          min(
            455px,
            72vw
          );
      }

      .desktop-nav {
        display: none;
      }

      .menu-button {
        display: block;
        flex: 0 0 auto;
      }

      .mobile-nav {
        position: absolute;
        top: 100%;
        left: 0;
        right: 0;

        display: grid;

        max-height: 0;

        overflow: hidden;

        border-bottom:
          1px solid transparent;

        background: #090a0b;

        opacity: 0;

        transition:
          max-height 0.28s ease,
          opacity 0.22s ease,
          border-color 0.22s ease;
      }

      .mobile-nav.is-open {
        max-height: 420px;

        border-bottom-color:
          var(--gold-soft);

        opacity: 1;
      }

      .mobile-nav a {
        padding: 18px 32px;

        border-top:
          1px solid rgba(255, 255, 255, 0.07);

        color: #b9b9b9;

        font-size: 0.78rem;
        font-weight: 800;
        letter-spacing: 0.15em;
        text-transform: uppercase;
      }

      .mobile-nav a[aria-current="page"] {
        color: var(--gold);
      }

      .back-navigation-inner {
        width:
          calc(100% - 68px);

        min-height: 52px;
      }

      .archive-section {
        padding:
          66px 0
          90px;
      }

      .archive-container {
        width:
          calc(100% - 68px);
      }

      .archive-heading {
        margin-bottom: 28px;
      }

      .archive-link {
        min-height: 60px;
        padding:
          17px 42px
          17px 0;
      }

      .archive-link::after {
        right: 4px;

        opacity: 0.72;
      }

      .archive-link:hover::after,
      .archive-link:focus-visible::after {
        transform: none;
      }
    }

    @media (max-width: 520px) {
      :root {
        --header-height: 180px;
      }

      .header-inner {
        width:
          calc(100% - 46px);

        gap: 16px;
      }

      .brand img {
        width:
          min(
            440px,
            72vw
          );
      }

      .menu-button {
        width: 50px;
        height: 50px;
      }

      .back-navigation-inner {
        width:
          calc(100% - 54px);

        min-height: 62px;
        gap: 9px 12px;
      }

      .back-navigation-link {
        font-size: 0.64rem;
        letter-spacing: 0.11em;
      }

      .back-navigation-divider {
        display: none;
      }

      .archive-section {
        padding:
          54px 0
          76px;
      }

      .archive-container {
        width:
          calc(100% - 54px);
      }

      .archive-heading {
        margin-bottom: 24px;

        font-size: 1.38rem;
      }

      .archive-link {
        min-height: 58px;
        padding:
          16px 38px
          16px 0;

        font-size: 0.98rem;
        line-height: 1.4;
      }

      .archive-link::after {
        right: 2px;

        font-size: 1.08rem;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        scroll-behavior: auto !important;
        transition: none !important;
      }
    }
  </style>
</head>

<body>

  <!-- ===================================
       HEADER
       =================================== -->

  <header class="site-header">

    <div class="header-inner">

      <a
        class="brand"
        href="index.html"
        aria-label="Pumunta sa homepage ng jhElmEr"
      >
        <img
          src="header-logo.png"
          alt="Simpleng Tao jhElmEr"
        >
      </a>

      <nav
        class="desktop-nav"
        aria-label="Pangunahing navigation"
      >
        <a href="index.html">
          Home
        </a>

        <a
          href="civic-explainers.html"
          aria-current="page"
        >
          Civic Explainers
        </a>

        <a href="text-slogan.html">
          Text Slogans
        </a>

        <a href="music.html">
          Music
        </a>

        <a href="about.html">
          About
        </a>
      </nav>

      <button
        class="menu-button"
        type="button"
        aria-label="Buksan ang navigation menu"
        aria-expanded="false"
        aria-controls="mobile-navigation"
      >
        <span></span>
        <span></span>
        <span></span>
      </button>

    </div>

    <nav
      class="mobile-nav"
      id="mobile-navigation"
      aria-label="Mobile navigation"
    >
      <a href="index.html">
        Home
      </a>

      <a
        href="civic-explainers.html"
        aria-current="page"
      >
        Civic Explainers
      </a>

      <a href="text-slogan.html">
        Text Slogans
      </a>

      <a href="music.html">
        Music
      </a>

      <a href="about.html">
        About
      </a>
    </nav>

  </header>

  <!-- ===================================
       RETURN NAVIGATION
       =================================== -->

  <div
    class="back-navigation"
    role="navigation"
    aria-label="Archive return navigation"
  >

    <div class="back-navigation-inner">

      <a
        class="back-navigation-link"
        href="index.html"
        aria-label="Bumalik sa Home"
      >
        <span
          class="back-navigation-arrow"
          aria-hidden="true"
        >
          ←
        </span>

        <span>
          Home
        </span>
      </a>

      <span
        class="back-navigation-divider"
        aria-hidden="true"
      >
        /
      </span>

      <a
        class="back-navigation-link"
        href="civic-explainers.html"
        aria-label="Bumalik sa Civic Explainers"
      >
        <span
          class="back-navigation-arrow"
          aria-hidden="true"
        >
          ←
        </span>

        <span>
          Civic Explainers
        </span>
      </a>

    </div>

  </div>

  <!-- ===================================
       ARCHIVE
       =================================== -->

  <main class="archive-main">

    <section class="archive-section">

      <div class="archive-container">

        <h1 class="archive-heading">
          All Civic Explainers
        </h1>

        <ul class="archive-list">

          <!--
            TEMPLATE NG BAWAT BAGONG ARTICLE:

            <li class="archive-item">
              <a
                class="archive-link"
                href="articles/pangalan-ng-article.html"
              >
                Title ng Article
              </a>
            </li>

            Ilagay palagi ang pinakabagong article
            sa pinakataas ng archive list.
          -->

          <li class="archive-item">

            <a
              class="archive-link"
              href="articles/civic-moral-decay.html"
            >
              Nakakatawa Ba?
            </a>

          </li>

          <li class="archive-item">

            <a
              class="archive-link"
              href="articles/civic-school-safety-act.html"
            >
              School Safety Act
            </a>

          </li>

        </ul>

      </div>

    </section>

  </main>

  <!-- ===================================
       FOOTER
       =================================== -->

  <footer class="site-footer">

    <p>
      © 2026 jhElmEr · Independent Civic &amp; Creative Platform
    </p>

  </footer>

  <!-- ===================================
       PAGE SCRIPT
       =================================== -->

  <script>
    const menuButton =
      document.querySelector(".menu-button");

    const mobileNavigation =
      document.querySelector(".mobile-nav");

    if (menuButton && mobileNavigation) {
      menuButton.addEventListener("click", function () {
        const isOpen =
          menuButton.classList.toggle("is-open");

        mobileNavigation.classList.toggle(
          "is-open",
          isOpen
        );

        menuButton.setAttribute(
          "aria-expanded",
          String(isOpen)
        );

        menuButton.setAttribute(
          "aria-label",
          isOpen
            ? "Isara ang navigation menu"
            : "Buksan ang navigation menu"
        );
      });

      mobileNavigation
        .querySelectorAll("a")
        .forEach(function (link) {
          link.addEventListener("click", function () {
            menuButton.classList.remove("is-open");
            mobileNavigation.classList.remove("is-open");

            menuButton.setAttribute(
              "aria-expanded",
              "false"
            );

            menuButton.setAttribute(
              "aria-label",
              "Buksan ang navigation menu"
            );
          });
        });
    }
  </script>

</body>

</html>
